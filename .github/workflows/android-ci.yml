name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant Gradle permission
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew build

    - name: Decode release keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "KEYSTORE_BASE64 secret is required for release validation"
          exit 1
        fi
        echo "$KEYSTORE_BASE64" | base64 --decode > liftrix-release.keystore

    - name: Release validation
      env:
        KEYSTORE_PATH: ../liftrix-release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew lintFull testReleaseUnitTest assembleRelease
      
    - name: Run tests
      run: ./gradlew test

    - name: Generate coverage report
      run: ./gradlew jacocoTestReport

    - name: Verify coverage threshold (40%)
      run: ./gradlew jacocoCoverageVerification

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: app/build/reports/jacoco/jacocoTestReport/html/

    - name: Upload release mapping
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: release-mapping
        path: app/build/outputs/mapping/release/mapping.txt
        if-no-files-found: error

    - name: Run Android tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        script: ./gradlew connectedAndroidTest

    - name: Run Android smoke tests API 35
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 35
        script: ./gradlew connectedDebugAndroidTest

    - name: Clean up keystore
      if: always()
      run: rm -f liftrix-release.keystore
