room = "2.7.0-alpha12"
# Note: Updated to alpha version that supports Kotlin 2.2.0 metadata
navigation = "2.8.0"
gson = "2.11.0"
workManager = "2.9.1"
timber = "5.0.1"
coreKtx = "1.13.1"
appcompat = "1.6.1"
junit = "4.13.2"
junitVersion = "1.2.1"
espressoCore = "3.6.1"
lifecycleRuntimeKtx = "2.6.1"
lifecycleLivedata = "2.6.1"
